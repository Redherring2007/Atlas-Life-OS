<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Atlas Life OS</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101418;
      --panel: #171d23;
      --panel-2: #1e262e;
      --line: #303a44;
      --text: #f5f1e8;
      --muted: #a9b3bc;
      --gold: #d6b66d;
      --green: #67d391;
      --red: #ff7a7a;
      --blue: #88b8ff;
      --radius: 8px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    button, input, textarea { font: inherit; }

    .shell {
      width: min(720px, 100%);
      margin: 0 auto;
      padding: 18px 14px calc(24px + env(safe-area-inset-bottom));
    }

    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      padding: 4px 2px 16px;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.1;
      font-weight: 760;
    }

    .subtle {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--green);
      box-shadow: 0 0 0 4px rgba(103, 211, 145, .13);
      margin-top: 8px;
      flex: 0 0 auto;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }

    .metric, .section, .task, .parking {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
    }

    .metric {
      padding: 12px;
      min-height: 72px;
    }

    .metric strong {
      display: block;
      font-size: 24px;
      line-height: 1;
      margin-bottom: 7px;
      color: var(--gold);
    }

    .section {
      padding: 14px;
      margin-top: 10px;
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    h2 {
      margin: 0;
      font-size: 15px;
      line-height: 1.2;
      font-weight: 720;
    }

    .task-list {
      display: grid;
      gap: 8px;
    }

    .task {
      padding: 12px;
      background: var(--panel-2);
    }

    .task-title {
      font-size: 15px;
      line-height: 1.35;
      margin-bottom: 8px;
    }

    .task-meta {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 10px;
    }

    .actions, .capture-actions {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .capture-actions, .before-actions { margin-top: 8px; }

    .button {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      min-height: 42px;
      color: var(--text);
      background: #242d36;
      padding: 10px 12px;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      white-space: normal;
    }

    .button.primary { background: var(--gold); color: #17130b; border-color: var(--gold); font-weight: 720; }
    .button.success { background: rgba(103, 211, 145, .14); border-color: rgba(103, 211, 145, .55); }
    .button.warn { background: rgba(214, 182, 109, .13); border-color: rgba(214, 182, 109, .55); }
    .button.danger { background: rgba(255, 122, 122, .12); border-color: rgba(255, 122, 122, .48); }
    .button.recording { border-color: var(--red); color: var(--red); }
    .button:disabled { opacity: .55; cursor: wait; }

    .parking {
      padding: 12px;
      background: var(--panel-2);
    }

    .parking-line {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
      margin: 4px 0 12px;
    }

    .parking-form, .task-edit {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 8px;
      margin-top: 8px;
    }

    input, textarea {
      min-width: 0;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: #101820;
      color: var(--text);
      padding: 0 12px;
      outline: none;
    }

    input { height: 42px; }
    textarea {
      width: 100%;
      min-height: 86px;
      padding: 11px 12px;
      resize: vertical;
    }

    .empty {
      color: var(--muted);
      padding: 14px 2px 4px;
      font-size: 14px;
      line-height: 1.45;
    }

    .toast {
      position: fixed;
      left: 14px;
      right: 14px;
      bottom: calc(14px + env(safe-area-inset-bottom));
      padding: 12px 14px;
      background: #0d1115;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      color: var(--text);
      box-shadow: 0 14px 44px rgba(0, 0, 0, .38);
      display: none;
      z-index: 5;
    }

    @media (max-width: 520px) {
      .shell { padding-left: 10px; padding-right: 10px; }
      .grid { grid-template-columns: 1fr; }
      .metric { min-height: auto; }
      .actions, .capture-actions, .parking-form, .task-edit { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div>
        <h1>Atlas Life OS</h1>
        <div id="timezone" class="subtle">Loading workspace</div>
      </div>
      <div class="status-dot" aria-hidden="true"></div>
    </header>

    <section class="grid" aria-label="Summary">
      <div class="metric"><strong id="pendingCount">0</strong><span class="subtle">Current tasks</span></div>
      <div class="metric"><strong id="todayCount">0</strong><span class="subtle">Due today</span></div>
      <div class="metric"><strong id="parkingState">-</strong><span class="subtle">Parking</span></div>
    </section>

    <section class="section">
      <div class="section-head">
        <h2>Capture</h2>
      </div>
      <textarea id="captureText" placeholder="Add a task, for example: Chase invoice tomorrow at 9am"></textarea>
      <div class="capture-actions">
        <button id="saveTask" class="button primary" type="button">Save</button>
        <button id="recordTask" class="button" type="button">Record</button>
        <button id="clearCapture" class="button" type="button">Clear</button>
      </div>
    </section>

    <section class="section">
      <div class="section-head">
        <h2>Parking</h2>
      </div>
      <div id="parkingPanel" class="parking"></div>
    </section>

    <section class="section">
      <div class="section-head">
        <h2>Current Tasks</h2>
        <button id="refresh" class="button" type="button">Refresh</button>
      </div>
      <div id="tasks" class="task-list"></div>
    </section>
  </main>

  <div id="toast" class="toast"></div>

  <script>
    const tg = window.Telegram?.WebApp;
    const initData = tg?.initData || "";
    const state = { busy: false, data: null, recorder: null, chunks: [], recording: false };
    const allowedKeys = { microphone: "atlas.microphone.allowed", geolocation: "atlas.location.allowed" };

    if (tg) {
      tg.ready();
      tg.expand();
      tg.setHeaderColor("#101418");
      tg.setBackgroundColor("#101418");
      tg.MainButton.hide();
    }

    const $ = (id) => document.getElementById(id);

    function showToast(message) {
      const toast = $("toast");
      toast.textContent = message;
      toast.style.display = "block";
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => { toast.style.display = "none"; }, 2600);
    }

    async function api(path, options = {}) {
      const res = await fetch(path, {
        ...options,
        headers: {
          "Content-Type": "application/json",
          "X-Telegram-Init-Data": initData,
          ...(options.headers || {})
        }
      });
      if (!res.ok) {
        const body = await res.json().catch(() => ({}));
        throw new Error(body.detail || "Request failed");
      }
      return res.json();
    }

    async function upload(path, formData) {
      const res = await fetch(path, {
        method: "POST",
        headers: { "X-Telegram-Init-Data": initData },
        body: formData
      });
      if (!res.ok) {
        const body = await res.json().catch(() => ({}));
        throw new Error(body.detail || "Upload failed");
      }
      return res.json();
    }

    async function permissionState(name) {
      if (!navigator.permissions?.query) return "prompt";
      try {
        const status = await navigator.permissions.query({ name });
        return status.state;
      } catch (_err) {
        return "prompt";
      }
    }

    async function rememberAllowed(name) {
      const key = allowedKeys[name];
      if (!key) return;
      localStorage.setItem(key, "1");
    }

    async function forgetAllowed(name) {
      const key = allowedKeys[name];
      if (!key) return;
      localStorage.removeItem(key);
    }

    function updateCounts(delta) {
      const pending = Math.max(0, Number($("pendingCount").textContent || 0) + delta);
      $("pendingCount").textContent = String(pending);
    }

    function taskCard(task) {
      const el = document.createElement("article");
      el.className = "task";
      renderTaskView(el, task);
      return el;
    }

    function renderTaskView(el, task) {
      el.innerHTML = `
        <div class="task-title"></div>
        <div class="task-meta"></div>
        <div class="actions">
          <button class="button success" type="button" data-action="done">Done</button>
          <button class="button" type="button" data-action="edit">Edit</button>
          <button class="button warn" type="button" data-action="snooze">20 min</button>
        </div>
        <div class="actions before-actions">
          <button class="button" type="button" data-before="15">15 min before</button>
          <button class="button" type="button" data-before="30">30 min</button>
          <button class="button" type="button" data-before="60">1 hr</button>
        </div>`;
      el.querySelector(".task-title").textContent = task.title;
      el.querySelector(".task-meta").textContent = task.due_label;
      el.querySelector('[data-action="done"]').addEventListener("click", async () => markDone(el, task));
      el.querySelector('[data-action="edit"]').addEventListener("click", () => renderTaskEditor(el, task));
      el.querySelector('[data-action="snooze"]').addEventListener("click", async () => {
        await mutate(() => api(`/api/tasks/${task.id}/snooze`, { method: "POST", body: JSON.stringify({ minutes: 20 }) }), "Reminder moved 20 minutes");
      });
      el.querySelectorAll("[data-before]").forEach((button) => {
        button.addEventListener("click", async () => {
          const minutes = Number(button.dataset.before);
          const label = minutes === 60 ? "1 hour" : `${minutes} minutes`;
          await mutate(() => api(`/api/tasks/${task.id}/reminder-before`, { method: "POST", body: JSON.stringify({ minutes }) }), `Reminder set ${label} before`);
        });
      });
    }

    function renderTaskEditor(el, task) {
      el.innerHTML = `
        <div class="task-meta">Edit task</div>
        <div class="task-edit">
          <input data-field="title" />
          <button class="button primary" type="button" data-action="save">Save</button>
          <button class="button" type="button" data-action="cancel">Cancel</button>
        </div>`;
      const input = el.querySelector('[data-field="title"]');
      input.value = task.title;
      input.focus();
      el.querySelector('[data-action="cancel"]').addEventListener("click", () => renderTaskView(el, task));
      el.querySelector('[data-action="save"]').addEventListener("click", async () => {
        const text = input.value.trim();
        if (!text) return showToast("Add a task name first");
        await mutate(async () => {
          const result = await api(`/api/tasks/${task.id}`, { method: "PUT", body: JSON.stringify({ text }) });
          renderTaskView(el, result.task);
        }, "Task updated", false);
      });
    }

    async function markDone(el, task) {
      if (state.busy) return;
      state.busy = true;
      try {
        await api(`/api/tasks/${task.id}/done`, { method: "POST" });
        updateCounts(-1);
        el.innerHTML = `
          <div class="task-title"></div>
          <div class="task-meta">Marked done</div>
          <button class="button warn" type="button" data-action="undo">Undo</button>`;
        el.querySelector(".task-title").textContent = task.title;
        el.querySelector('[data-action="undo"]').addEventListener("click", async () => {
          await mutate(() => api(`/api/tasks/${task.id}/undo`, { method: "POST" }), "Task restored");
        });
        showToast("Task marked done");
      } catch (err) {
        showToast(err.message);
      } finally {
        state.busy = false;
      }
    }

    function renderParking(parking) {
      const panel = $("parkingPanel");
      panel.innerHTML = "";
      if (!parking) {
        panel.innerHTML = `
          <div class="parking-line">No parking location saved.</div>
          <button id="saveParking" class="button primary" type="button">Save current location</button>`;
        $("saveParking").addEventListener("click", saveCurrentParking);
        return;
      }

      const bay = parking.bay_number ? `Bay ${parking.bay_number}` : "No bay added";
      panel.innerHTML = `
        <div class="parking-line">${parking.updated_label || "Saved"}<br>${bay}</div>
        <div class="actions">
          <a class="button primary" href="${parking.maps_url}" target="_blank" rel="noopener">Directions</a>
          <button id="clearParking" class="button danger" type="button">Picked up</button>
        </div>
        <div class="parking-form">
          <input id="bayInput" placeholder="Bay, row, floor" value="${parking.bay_number || ""}" />
          <button id="saveBay" class="button" type="button">Save bay</button>
        </div>`;
      $("clearParking").addEventListener("click", async () => {
        await mutate(() => api("/api/parking", { method: "DELETE" }), "Parking cleared");
      });
      $("saveBay").addEventListener("click", async () => {
        const value = $("bayInput").value.trim();
        if (!value) return showToast("Add a bay number first");
        await mutate(() => api("/api/parking/bay", { method: "POST", body: JSON.stringify({ bay_number: value }) }), "Bay saved");
      });
    }

    function render(data) {
      state.data = data;
      $("timezone").textContent = data.timezone;
      $("pendingCount").textContent = data.counts.pending;
      $("todayCount").textContent = data.counts.today;
      $("parkingState").textContent = data.parking ? "Saved" : "Open";
      renderParking(data.parking);

      const tasks = $("tasks");
      tasks.innerHTML = "";
      if (!data.tasks.length) {
        tasks.innerHTML = `<div class="empty">No current tasks. Add one above or send a task in Telegram.</div>`;
        return;
      }
      data.tasks.forEach((task) => tasks.appendChild(taskCard(task)));
    }

    async function load() {
      if (!initData) {
        showToast("Open this from Telegram to sign in.");
        return;
      }
      try {
        render(await api("/api/me"));
      } catch (err) {
        showToast(err.message);
      }
    }

    async function mutate(fn, message, reload = true) {
      if (state.busy) return;
      state.busy = true;
      try {
        await fn();
        showToast(message);
        if (reload) await load();
      } catch (err) {
        showToast(err.message);
      } finally {
        state.busy = false;
      }
    }

    async function saveCurrentParking() {
      if (!navigator.geolocation) {
        showToast("Location is not available on this device");
        return;
      }
      await permissionState("geolocation");
      navigator.geolocation.getCurrentPosition(async (pos) => {
        rememberAllowed("geolocation");
        const bay = prompt("Bay, row, or floor?", "") || "";
        await mutate(() => api("/api/parking", {
          method: "POST",
          body: JSON.stringify({
            latitude: pos.coords.latitude,
            longitude: pos.coords.longitude,
            bay_number: bay.trim() || null
          })
        }), "Parking saved");
      }, () => {
        forgetAllowed("geolocation");
        showToast("Location permission was not granted");
      }, { enableHighAccuracy: true, timeout: 12000 });
    }

    async function saveTask() {
      const text = $("captureText").value.trim();
      if (!text) return showToast("Type a task first");
      await mutate(() => api("/api/capture", { method: "POST", body: JSON.stringify({ text }) }), "Task saved");
      $("captureText").value = "";
    }

    async function toggleRecord() {
      const button = $("recordTask");
      if (state.recording) {
        state.recorder.stop();
        return;
      }
      if (!navigator.mediaDevices?.getUserMedia || !window.MediaRecorder) {
        showToast("Voice recording is not available here");
        return;
      }
      await permissionState("microphone");
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        rememberAllowed("microphone");
        state.chunks = [];
        state.recorder = new MediaRecorder(stream);
        state.recorder.ondataavailable = (event) => {
          if (event.data.size) state.chunks.push(event.data);
        };
        state.recorder.onstop = async () => {
          stream.getTracks().forEach((track) => track.stop());
          state.recording = false;
          button.textContent = "Record";
          button.classList.remove("recording");
          const blob = new Blob(state.chunks, { type: state.recorder.mimeType || "audio/webm" });
          const formData = new FormData();
          formData.append("file", blob, "atlas-voice.webm");
          await mutate(() => upload("/api/capture/voice", formData), "Voice task saved");
        };
        state.recording = true;
        button.textContent = "Stop";
        button.classList.add("recording");
        state.recorder.start();
      } catch (_err) {
        forgetAllowed("microphone");
        showToast("Microphone permission was not granted");
      }
    }

    $("refresh").addEventListener("click", load);
    $("saveTask").addEventListener("click", saveTask);
    $("recordTask").addEventListener("click", toggleRecord);
    $("clearCapture").addEventListener("click", () => { $("captureText").value = ""; });
    load();
  </script>
</body>
</html>
